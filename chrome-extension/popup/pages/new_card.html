<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles/reset.css" />
    <link rel="stylesheet" href="../styles/default.css" />
    <link rel="stylesheet" href="../styles/new_card.css" />

    <script type="module" src="../scripts/new_card.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="logo">REWARDIA</div>
      <div class="header_options">
        <div class="settings"></div>
      </div>
    </header>
    <div class="new_card_form">
      <h1>新增卡片</h1>
      <form method="post">
        <div class="banks">
          <label for="bank_select"> * 發卡銀行 </label>
          <div>
            <select id="bank_select" name="bank_name" required>
              <option value="">選擇發卡銀行</option>
            </select>
          </div>
        </div>

        <div class="cards">
          <label for="card_select"> * 卡片 </label>
          <div>
            <select id="card_select" name="card" required>
              <option>選擇卡片</option>
            </select>
          </div>
        </div>
        <button id="new_card_submit" type="submit">新增</button>
      </form>
    </div>
    <nav class="navbar">
      <div class="icon">
        <a href="index.html">
          <span>首頁</span>
        </a>
      </div>
      <div class="icon">
        <a href="rewards.html">
          <span>商家回饋</span>
        </a>
      </div>
      <div class="icon">
        <a href="login.html">
          <span>帳號</span>
        </a>
      </div>
    </nav>
  </body>
</html>
